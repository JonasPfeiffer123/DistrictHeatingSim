name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      # Force headless Qt so importing any module that pulls in PyQt6 does not
      # need an X server on the CI runner.
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      # PyQt6 needs these shared libraries even to *import* (e.g. libEGL.so.1),
      # before any offscreen rendering. The domain-core tests pull in PyQt6
      # transitively (energy_system imports CustomJSONEncoder from the gui package),
      # so every test module needs them.
      - name: Install system libraries for headless Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest

  lint:
    name: ruff (advisory)
    runs-on: ubuntu-latest
    # Advisory for now: the legacy GUI layer is not yet lint-clean, so a failure
    # here must not block merges. Remove this line once the tree is clean and
    # lint should gate the build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint (config + excludes from pyproject.toml)
        run: ruff check .

      - name: Format check (tests only for now)
        run: ruff format --check tests
